<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gridge AI Logger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .header {
      background: #1722E8;
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 14px;
    }
    .header h1 { font-size: 14px; font-weight: 700; }
    .header p { font-size: 10px; opacity: 0.7; }
    .status-bar {
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      background: white; border-bottom: 1px solid #eee;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-dot.on { background: #10b981; }
    .status-dot.off { background: #ef4444; }
    .status-dot.pending { background: #f59e0b; }
    .status-text { font-size: 12px; color: #666; }
    .toggle-btn {
      padding: 4px 12px; border-radius: 6px; border: none;
      font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .toggle-btn.on { background: #10b981; color: white; }
    .toggle-btn.off { background: #eee; color: #999; }
    .section { padding: 16px; background: white; margin-top: 1px; }
    .section-title {
      font-size: 10px; font-weight: 700; color: #999;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
    }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; }
    .field input {
      width: 100%; padding: 8px 10px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 12px; outline: none;
    }
    .field input:focus { border-color: #1722E8; }
    .save-btn {
      width: 100%; padding: 10px; background: #1722E8; color: white;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .save-btn:hover { opacity: 0.9; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .stat-card { background: #f9f9f9; border-radius: 8px; padding: 10px; text-align: center; }
    .stat-card .value { font-size: 18px; font-weight: 800; color: #333; }
    .stat-card .label { font-size: 10px; color: #999; margin-top: 2px; }
    .msg { font-size: 11px; padding: 8px; border-radius: 6px; margin-top: 8px; text-align: center; }
    .msg.success { background: #ecfdf5; color: #059669; }
    .msg.success { background: #ecfdf5; color: #059669; }
    .msg.error { background: #fef2f2; color: #dc2626; }

    /* New styles for UI improvement */
    .settings-toggle {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; opacity: 0.6; transition: opacity 0.2s;
    }
    .settings-toggle:hover { opacity: 1; }
    .settings-toggle svg { width: 16px; height: 16px; fill: currentColor; }
    
    #settingsSection {
      max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out;
      border-top: 1px solid transparent;
    }
    #settingsSection.open {
      max-height: 400px;
      margin-top: 10px;
      border-top: 1px solid #eee;
    }
    
    .premium-badge {
      font-size: 9px; background: rgba(255,255,255,0.2);
      padding: 2px 6px; border-radius: 4px; font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">G</div>
    <div style="flex: 1">
      <div style="display: flex; align-items: center; gap: 6px;">
        <h1>Gridge AI Logger</h1>
        <span class="premium-badge">ZERO CONFIG</span>
      </div>
      <p>AI 사용 로그 자동 수집</p>
    </div>
    <div class="settings-toggle" id="settingsToggle">
      <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.91,7.62,6.29L5.23,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.71,8.87 c-0.12,0.21-0.07,0.47,0.12,0.61l2.03,1.58C4.81,11.36,4.79,11.68,4.79,12c0,0.32,0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.21,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
    </div>
  </div>

  <div class="status-bar">
    <div>
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">확인 중...</span>
    </div>
    <button class="toggle-btn" id="toggleBtn">-</button>
  </div>

  <div class="section">
    <div class="section-title">수집 현황</div>
    <div class="stats">
      <div class="stat-card">
        <div class="value" id="queueCount">-</div>
        <div class="label">전송 대기</div>
      </div>
      <div class="stat-card">
        <div class="value" id="captureCount">-</div>
        <div class="label">수집 지원</div>
      </div>
    </div>
    <button class="save-btn" id="flushBtn" style="background:#f59e0b">지금 전송</button>
  </div>

  <div class="section">
    <div id="settingsSection">
      <div class="section-title">서버 연결 설정</div>
      <div class="field">
        <label>Gridge 서버 URL</label>
        <input type="url" id="serverUrl" placeholder="https://gridge.company.com">
      </div>
      <div class="field">
        <label>API Key</label>
        <input type="text" id="apiKey" placeholder="ext_xxxxx">
      </div>
      <div class="field">
        <label>유저 ID</label>
        <input type="text" id="userId" placeholder="u-001">
      </div>
      <button class="save-btn" id="saveBtn">설정 저장</button>
      <div id="message" class="msg" style="display:none"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
